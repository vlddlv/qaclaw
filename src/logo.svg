<!-- Wordmark — green fill with purple stroke -->
<text x="340" y="280" text-anchor="middle" font-family="var(--font-sans)" font-size="42" font-weight="500" fill="#1D9E75" stroke="#534AB7" stroke-width="2.5" stroke-linejoin="round" paint-order="stroke fill" letter-spacing="6" style="fill:rgb(29, 158, 117);stroke:rgb(83, 74, 183);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:42px;font-weight:500;text-anchor:middle;dominant-baseline:auto">QACLAW</text>
<text x="340" y="310" text-anchor="middle" font-family="var(--font-sans)" font-size="13" fill="#1D9E75" stroke="#534AB7" stroke-width="1.5" stroke-linejoin="round" paint-order="stroke fill" letter-spacing="3" style="fill:rgb(29, 158, 117);stroke:rgb(83, 74, 183);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:13px;font-weight:400;text-anchor:middle;dominant-baseline:auto">AUTONOMOUS QA AGENT</text>
